<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>AuraVerge | Premium 3D E-commerce Experience</title>
    <meta name="description" content="Explore AuraVerge, the ultimate premium 3D e-commerce platform. Experience luxury shopping with immersive animations, curated collections, and cutting-edge design." />
    <meta name="keywords" content="e-commerce, 3d shopping, luxury fashion, tech lifestyle, AuraVerge, premium experience, digital design, immersive shopping" />
    <meta name="author" content="AuraVerge Team" />
    <link rel="canonical" href="https://auraverge.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://auraverge.com" />
    <meta property="og:title" content="AuraVerge | Premium 3D E-commerce Experience" />
    <meta property="og:description" content="The ultimate immersive shopping experience with 3D-inspired design and premium animations." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1613040809024-b4ef7ba99bc3?auto=format&fit=crop&q=80&w=1200" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://auraverge.com" />
    <meta property="twitter:title" content="AuraVerge | Premium 3D E-commerce Experience" />
    <meta property="twitter:description" content="The ultimate immersive shopping experience with 3D-inspired design and premium animations." />
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1613040809024-b4ef7ba99bc3?auto=format&fit=crop&q=80&w=1200" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "AuraVerge",
        "url": "https://auraverge.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://auraverge.com/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "AuraVerge",
        "url": "https://auraverge.com",
        "logo": "https://auraverge.com/logo.png",
        "sameAs": [
          "https://twitter.com/auraverge",
          "https://instagram.com/auraverge"
        ]
      }
    </script>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
